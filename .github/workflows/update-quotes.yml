name: Update Quotes Data

on:
  workflow_dispatch: # Manual trigger

permissions:
  contents: write # Required to commit and push changes back to the repository

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch and format quotes JSON
        run: node scripts/fetch-quotes.mjs

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/quotes.json
          # Commit only if there are changes
          git commit -m "Automated data update: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || exit 0
          git push
